<!DOCTYPE html>
<html lang="en" data-subject="algebra">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Math</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navigation ───────────────────────────────────────────────────────── -->
  <nav>
    <a class="nav-brand" href="https://guadalu-pe.github.io/morning-math/">
      <div class="nav-brand-dot"></div>
      Morning Math
    </a>
    <div class="nav-spacer"></div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <svg id="themeIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8" y1="1" x2="8" y2="2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="13.5" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1" y1="8" x2="2.5" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="13.5" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3.05" y1="3.05" x2="4.11" y2="4.11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="11.89" y1="11.89" x2="12.95" y2="12.95" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12.95" y1="3.05" x2="11.89" y2="4.11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4.11" y1="11.89" x2="3.05" y2="12.95" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="nav-random-btn" onclick="loadRandom()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
            <rect x="1" y="1" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="5" cy="5" r="1.2" fill="currentColor"/>
            <circle cx="11" cy="5" r="1.2" fill="currentColor"/>
            <circle cx="8" cy="8" r="1.2" fill="currentColor"/>
            <circle cx="5" cy="11" r="1.2" fill="currentColor"/>
            <circle cx="11" cy="11" r="1.2" fill="currentColor"/>
          </svg> Random problem</button>
  </nav>

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <main>

    <!-- Date chip -->
    <div class="date-row">
      <div class="date-chip">
        <div class="date-chip-dot"></div>
        <span id="dateChip"></span>
      </div>
    </div>

    <!-- Problem hero -->
    <div class="problem-hero">
      <div class="problem-hero-eyebrow" id="heroEyebrow"></div>
      <div class="problem-hero-concept" id="heroConcept"></div>
      <div class="problem-hero-text" id="problemText"></div>
      <p class="problem-hero-desc" id="heroDesc"></p>
      <button class="solve-btn" id="solveBtn" onclick="revealSolution()">
        Show me how to solve this <span class="solve-arrow">↓</span>
      </button>
    </div>

    <!-- Diagram (geometry only) -->
    <div class="card diagram-card" id="diagramCard" style="display:none;">
      <canvas id="diagram" width="560" height="180"></canvas>
    </div>

    <!-- Solution (hidden until button click) -->
    <div class="solution-section" id="solutionSection">

      <!-- Step navigator -->
      <div class="card steps-card">
        <div class="steps-card-header">
          <span class="steps-card-label">Step-by-step solution</span>
          <span class="step-counter" id="stepCounter">1 of 4</span>
        </div>

        <div class="step-stage">
          <div class="step-card" id="stepCard">
            <div class="step-num" id="stepCardNum">1</div>
            <div class="step-body">
              <div class="step-action" id="stepCardAction"></div>
              <div class="step-math"  id="stepCardMath"></div>
              <div class="step-eli5"  id="stepCardEli5"></div>
            </div>
          </div>
        </div>

        <div class="step-trail" id="stepTrail"></div>

        <div class="step-nav">
          <button class="nav-btn nav-back" id="navBack" onclick="goStep(-1)" disabled>← Back</button>
          <button class="nav-btn nav-next" id="navNext" onclick="goStep(1)">Next Step →</button>
        </div>
      </div>

      <!-- Answer -->
      <div class="card answer-card" id="answerCard">
        <div class="answer-icon">✦</div>
        <div class="answer-label">Answer</div>
        <div class="answer-value" id="answerValue"></div>
        <button class="replay-btn" onclick="replay()">↺ &nbsp;Try again</button>
      </div>

    </div>

  </main>

  <footer>
    one concept &nbsp;·&nbsp; one problem &nbsp;·&nbsp; every morning
  </footer>

  <!-- ── Email signup wall ─────────────────────────────────────────────────── -->
  <div class="wall-overlay" id="wallOverlay">
    <div class="wall-card" id="wallCard">
      <div class="wall-emoji">☀️</div>
      <h2 class="wall-headline">Math for breakfast?</h2>
      <p class="wall-sub">Get one fresh problem in your inbox every morning — no spam, no fluff, just one satisfying puzzle to kick off your day.</p>
      <form class="wall-form" id="wallForm" onsubmit="handleWallSubmit(event)">
        <input class="wall-input" id="wallEmail" type="email" placeholder="your@email.com" autocomplete="email" required />
        <button class="wall-btn" type="submit">Send me problems ✦</button>
      </form>
      <div class="wall-success" id="wallSuccess">
        <span class="wall-success-icon">✦</span> You're in! See you tomorrow morning.
      </div>
      <button class="wall-skip" id="wallSkip" onclick="dismissWall()">nah, I'm good for now</button>
    </div>
  </div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
